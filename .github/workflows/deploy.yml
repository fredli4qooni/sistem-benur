name: Deploy Web Penjualan Benur (ZIP Method)

on:
  push:
    branches:
      - main # Sesuaikan jika branch utama Anda master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Kode Terbaru
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: 📦 Install Composer
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install NPM & Build Assets (Vite)
        run: |
          npm install
          npm run build

      - name: 🔄 Ubah Path index.php Otomatis
        run: |
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../laravel_core/vendor/autoload.php'|g" public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../laravel_core/bootstrap/app.php'|g" public/index.php

      - name: 🗂️ Packing & Zipping (Anti-Reset FTP)
        run: |
          # 1. Buat folder staging sementara
          mkdir -p staging/laravel_core
          mkdir -p staging/public_html
          
          # 2. Pisahkan folder public (aset web)
          mv public/* staging/public_html/
          mv public/.htaccess staging/public_html/
          rm -rf public
          
          # 3. Pindahkan semua file sisanya (core Laravel) ke laravel_core
          shopt -s extglob
          mv !(staging|.git|.github) staging/laravel_core/
          
          # 4. Kompres jadi satu file ZIP
          cd staging
          zip -qq -r release.zip laravel_core public_html
          cd ..
          
          # 5. Siapkan folder khusus untuk diupload ke server
          mkdir -p to_upload/public_html
          mv staging/release.zip to_upload/
          
          # 6. Buat script eksekutor PHP (unzip.php)
          cat << 'EOF' > to_upload/public_html/unzip.php
          <?php
          $zipFile = __DIR__ . '/../release.zip';
          if (file_exists($zipFile)) {
              $zip = new ZipArchive;
              if ($zip->open($zipFile) === TRUE) {
                  $zip->extractTo(__DIR__ . '/../');
                  $zip->close();
                  unlink($zipFile); // Hapus zip setelah selesai
                  unlink(__FILE__); // Hapus script ini demi keamanan
                  echo "SUCCESS: Auto-Deploy Berhasil!";
              } else {
                  echo "ERROR: Gagal ekstrak file ZIP.";
              }
          } else {
              echo "ERROR: File release.zip tidak ditemukan di server.";
          }
          ?>
          EOF

      - name: 📂 Upload ZIP & Script via FTP (cURL)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl --ftp-pasv -T to_upload/release.zip ftp://$FTP_SERVER/domains/sentra-benur.store/release.zip --user "$FTP_USERNAME:$FTP_PASSWORD"
          curl --ftp-pasv -T to_upload/public_html/unzip.php ftp://$FTP_SERVER/domains/sentra-benur.store/public_html/unzip.php --user "$FTP_USERNAME:$FTP_PASSWORD"

      - name: 🚀 Ekstrak Otomatis di Server
        run: curl -s https://sentra-benur.store/unzip.php