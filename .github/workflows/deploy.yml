name: Deploy Web Penjualan Benur (ZIP Method)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Kode Terbaru
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: 📦 Install Composer
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install NPM & Build Assets (Vite)
        run: |
          npm install
          npm run build

      - name: 🔄 Ubah Path index.php Otomatis
        run: |
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../laravel_core/vendor/autoload.php'|g" public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../laravel_core/bootstrap/app.php'|g" public/index.php
          sed -i "s|\$app = require_once __DIR__.'/../laravel_core/bootstrap/app.php';|\$app = require_once __DIR__.'/../laravel_core/bootstrap/app.php';\n\$app->usePublicPath(__DIR__);|g" public/index.php

      - name: 🗂️ Packing & Zipping (Anti-Reset FTP)
        run: |
          mkdir -p staging/laravel_core
          mkdir -p staging/public_html
          
          mv public/* staging/public_html/
          mv public/.htaccess staging/public_html/
          rm -rf public
          
          shopt -s extglob
          mv !(staging|.git|.github) staging/laravel_core/
          
          cd staging
          zip -qq -r release.zip laravel_core public_html
          cd ..
          
          mkdir -p to_upload/public_html
          mv staging/release.zip to_upload/
          
          cat << 'EOF' > to_upload/public_html/unzip.php
          <?php
          $zipFile = __DIR__ . '/../release.zip';
          if (file_exists($zipFile)) {
              $zip = new ZipArchive;
              if ($zip->open($zipFile) === TRUE) {
                  $zip->extractTo(__DIR__ . '/../');
                  $zip->close();
                  unlink($zipFile); // Bersihkan zip
                  
                  // Hapus View Cache Laravel
                  $viewCaches = glob(__DIR__ . '/../laravel_core/storage/framework/views/*.php');
                  foreach($viewCaches as $file) {
                      if(is_file($file)) {
                          unlink($file);
                      }
                  }
                  
                  unlink(__FILE__); // Bersihkan script
                  echo "SUCCESS: Auto-Deploy Berhasil & View Cache Dibersihkan!";
              } else {
                  echo "ERROR: Gagal ekstrak file ZIP.";
              }
          } else {
              echo "ERROR: File release.zip tidak ditemukan di server.";
          }
          ?>
          EOF

      - name: 📂 Upload ZIP via SamKirkland
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./to_upload/
          server-dir: /

      - name: 🚀 Ekstrak Otomatis di Server
        run: curl -s https://sentra-benur.store/unzip.php